name: Build Image

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.head.repo.full_name || github.repository }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/gmcouto/code-server-ai-tools

jobs:
  # Builds the published artifact (FROM scratch mod image) and pushes a
  # sha-tagged image to GHCR so the publish job can retag it on release.
  # Skips the push for fork PRs (no write access to the repo's GHCR namespace).
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build image
        run: docker build -t ${{ env.IMAGE }}:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Push sha-tagged image to GHCR
        if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'
        run: docker push ${{ env.IMAGE }}:${{ github.sha }}

  # Builds the mod image locally, bakes it into a combined test image, and
  # runs the full integration checks — no GHCR push required, runs for all
  # PRs including forks.
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Run local mod integration validation
        run: ./scripts/validate-mods-local.sh

      - name: Upload container log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: container-startup-log
          path: /tmp/container-startup-local.log
          retention-days: 7

  # Retags the sha-tagged image built by the build job as a versioned release.
  # Runs only on version tags, and only after both build and validate pass.
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, validate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Log in to GitHub Container Registry
        run: echo "${{ github.token }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Pull sha-tagged image and retag as release
        run: |
          docker pull ${{ env.IMAGE }}:${{ github.sha }}
          TAG=${GITHUB_REF#refs/tags/}
          docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:${TAG}
          docker push ${{ env.IMAGE }}:${TAG}
          printf "\n## Pushed the following images to GHCR:\n\n" >> $GITHUB_STEP_SUMMARY
          echo "\`${{ env.IMAGE }}:${TAG}\`" >> $GITHUB_STEP_SUMMARY
          if [[ "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            docker tag ${{ env.IMAGE }}:${{ github.sha }} ${{ env.IMAGE }}:latest
            docker push ${{ env.IMAGE }}:latest
            echo "\`${{ env.IMAGE }}:latest\`" >> $GITHUB_STEP_SUMMARY
          fi
